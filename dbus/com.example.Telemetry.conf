<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the service's own user may own the name. -->
  <policy user="root">
    <allow own="com.example.Telemetry"/>
  </policy>

  <!-- Anyone may call GetStatus/get the property; restrict Reset as needed. -->
  <policy context="default">
    <allow send_destination="com.example.Telemetry"
           send_interface="com.example.Telemetry1"
           send_member="GetStatus"/>
    <allow send_destination="com.example.Telemetry"
           send_interface="org.freedesktop.DBus.Properties"/>
    <!-- Tighten this: only privileged callers should Reset. -->
    <deny  send_destination="com.example.Telemetry"
           send_interface="com.example.Telemetry1"
           send_member="Reset"/>
  </policy>
</busconfig>

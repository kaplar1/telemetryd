<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- telemetryd.service runs with DynamicUser=yes: a random,
       non-root UID assigned per run, so there's no fixed username to
       pin this to. Allowing any local user to own the name is the
       pragmatic tradeoff for now; the real fix, if this needs to be
       tightened for the threat model, is to drop DynamicUser in favor
       of a fixed system user (via useradd.bbclass) and restrict this
       policy to that specific user instead. -->
  <policy context="default">
    <allow own="com.example.Telemetry"/>
  </policy>

  <!-- Anyone may call GetStatus/get the property; restrict Reset as needed. -->
  <policy context="default">
    <allow send_destination="com.example.Telemetry"
           send_interface="com.example.Telemetry1"
           send_member="GetStatus"/>
    <allow send_destination="com.example.Telemetry"
           send_interface="org.freedesktop.DBus.Properties"/>
    <!-- Tighten this: only privileged callers should Reset. -->
    <deny  send_destination="com.example.Telemetry"
           send_interface="com.example.Telemetry1"
           send_member="Reset"/>
  </policy>
</busconfig>
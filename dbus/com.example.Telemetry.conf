<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- telemetryd.service now runs as the fixed "telemetryd" system user,
       not DynamicUser: on-target testing showed DynamicUser's ephemeral
       UID broke the RequestName handshake. -->
  <policy user="telemetryd">
    <allow own="com.example.Telemetry"/>
  </policy>

  <!-- Anyone may call GetStatus/get the property/introspect; restrict
       Reset as needed. -->
  <policy context="default">
    <allow send_destination="com.example.Telemetry"
           send_interface="com.example.Telemetry1"
           send_member="GetStatus"/>
    <allow send_destination="com.example.Telemetry"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="com.example.Telemetry"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <deny  send_destination="com.example.Telemetry"
           send_interface="com.example.Telemetry1"
           send_member="Reset"/>
  </policy>
</busconfig>